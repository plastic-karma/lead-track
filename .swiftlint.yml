# SwiftLint configuration for lead-track

# Paths to exclude from linting
excluded:
  - .build
  - DerivedData

# Opt-in rules that help prevent overly complex code
opt_in_rules:
  - closure_body_length
  - discouraged_optional_boolean
  - empty_count
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - last_where
  - modifier_order
  - overridden_super_call
  - private_action
  - private_outlet
  - sorted_first_last
  - toggle_bool
  - unavailable_function
  - unowned_variable_capture
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - yoda_condition

# Complexity thresholds — keep code simple and readable
cyclomatic_complexity:
  warning: 5
  error: 10
  ignores_case_statements: true

function_body_length:
  warning: 30
  error: 50

type_body_length:
  warning: 200
  error: 350

file_length:
  warning: 300
  error: 500

function_parameter_count:
  warning: 4
  error: 6

closure_body_length:
  warning: 20
  error: 40

nesting:
  type_level:
    warning: 2
    error: 3
  function_level:
    warning: 3
    error: 5

large_tuple:
  warning: 3
  error: 4

line_length:
  warning: 120
  error: 200
  ignores_urls: true
  ignores_comments: false

type_name:
  excluded:
    - lead_trackApp
    - lead_track_Watch_AppApp

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - i
    - id
    - x
    - y
    - z
