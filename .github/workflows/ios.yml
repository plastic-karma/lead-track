name: iOS

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Lint, build & test (iOS)
    runs-on: macos-latest
    env:
      SCHEME: "lead track"
      PROJECT: "lead track.xcodeproj"
      DESTINATION: "platform=iOS Simulator,name=iPhone 16"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install linters
        run: brew install swiftlint swiftformat

      - name: SwiftFormat (lint only)
        run: swiftformat --lint .

      - name: SwiftLint
        run: swiftlint

      - name: Build for testing
        run: xcodebuild build-for-testing -scheme "$SCHEME" -project "$PROJECT" -destination "$DESTINATION"

      - name: Test
        run: xcodebuild test-without-building -scheme "$SCHEME" -project "$PROJECT" -destination "$DESTINATION"
